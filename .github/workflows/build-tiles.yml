name: Generate PMTiles

on:
  workflow_dispatch: # Manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Transform JSON to Internal GeoJSON
        run: |
          python3 -c "
          import json
          # Load the raw tycoon data
          with open('prop.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          # Convert to a standard GeoJSON FeatureCollection
          # We explicitly map 'n' to 'n' and 'id' to 'id' so your UI logic doesn't break
          features = []
          for p in data:
              features.append({
                  'type': 'Feature',
                  'id': p['id'], # Vital for promoteId: 'id' in MapLibre
                  'geometry': {'type': 'Point', 'coordinates': [p['lng'], p['lat']]},
                  'properties': {
                      'id': p['id'],
                      'n': p['n'],   # Name field for the property card
                      'cat': p['cat'],
                      'icon': p.get('icon', ''),
                      'v': p['v']    # Value (e.g., 10 Trillion)
                  }
              })

          geojson = {'type': 'FeatureCollection', 'features': features}
          
          with open('internal_temp.geojson', 'w', encoding='utf-8') as f:
              json.dump(geojson, f)
          "

      - name: Install Tippecanoe
        run: |
          git clone https://github.com/felt/tippecanoe.git
          cd tippecanoe
          make -j
          sudo make install

      - name: Bake PMTiles
        run: |
          # -l world: Forces the internal layer name to match what Map.tsx expects
          # -zg: Auto-calculate zoom levels
          # --force: Overwrite existing pmtiles
          # --drop-densest-as-needed: Prevents map crashes in high-density areas
          tippecanoe -l world -zg -o world.pmtiles --drop-densest-as-needed --force internal_temp.geojson

      - name: Cleanup & Deploy
        run: |
          # Delete the middle-man file so it doesn't sit in your repo
          rm internal_temp.geojson
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add world.pmtiles
          git commit -m "🚀 Automated Market Update: world.pmtiles generated" || echo "No changes to commit"
          git push
